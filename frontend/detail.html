<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动漫详情</title>
    <link rel="stylesheet" href="style.css">
    <header>
        <div style="position:absolute;right:24px;top:18px;z-index:200;">
            <button id="theme-toggle-btn" class="btn btn-secondary"
                style="padding:6px 16px;font-size:1em;">切换黑白</button>
        </div>
        <div class="nav-bar">
            <a href="index.html" class="logo" id="home-link">
                <i class="fas fa-play-circle"></i>
                <span>My Anime List</span>
            </a>
        </div>
    </header>
    </a>
    </div>
    </header>
    <div class="container">
        <div id="detail-page" class="page active">
            <div class="detail-container">
                <div class="anime-header">
                    <div class="detail-poster" id="detail-poster"></div>
                    <div class="detail-info">
                        <h1 class="detail-title" id="detail-title"></h1>
                        <div class="detail-meta" id="detail-meta"></div>
                        <div class="detail-desc" id="detail-desc"></div>
                        <button id="back-btn" class="btn"><i class="fas fa-arrow-left"></i>返回首页</button>
                    </div>
                </div>
                <div class="player-container">
                    <h2 class="section-title"><i class="fas fa-play-circle"></i>播放器</h2>
                    <div class="video-player">
                        <video id="flv-video" controls style="width:100%;height:100%;background:#000;display:none;">
                        </video>
                        <div class="video-placeholder" id="video-placeholder">
                            <i class="fas fa-video"></i>
                            <div>请从下方选择剧集开始播放</div>
                        </div>
                    </div>
                    <div class="episodes">
                        <h2 class="section-title"><i class="fas fa-list"></i>剧集列表</h2>
                        <div class="episode-list" id="episode-list"></div>
                    </div>
                    <div class="magnet-info">
                        <p>磁力链接：<span id="magnet-link"></span></p>
                        <p>您同样可以使用磁力链接下载视频文件，然后本地观看</p>
                    </div>
                    <div class="external-player">
                        <h2 class="section-title"><i class="fas fa-list"></i>用外部播放器打开</h2>
                        <button id="open-iina" class="btn" style="margin-right:10px;"><img
                                src="./img/IINA-v1.1-icon.png"
                                style="width:1em;height:1em;vertical-align:middle;margin-right:4px;">IINA
                            播放</button>
                        <button id="open-potplayer" class="btn btn-secondary"><img src="./img/Potplayer_Logo.png"
                                style="width:1em;height:1em;vertical-align:middle;margin-right:4px;">PotPlayer
                            播放</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>
    <script>
        // 主题切换逻辑
        function setTheme(theme) {
            document.body.classList.remove('theme-dark', 'theme-light');
            document.body.classList.add(theme === 'light' ? 'theme-light' : 'theme-dark');
            localStorage.setItem('theme', theme);
        }
        function toggleTheme() {
            const current = document.body.classList.contains('theme-light') ? 'light' : 'dark';
            setTheme(current === 'light' ? 'dark' : 'light');
        }
        window.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('theme-toggle-btn');
            if (btn) btn.onclick = toggleTheme;
            // 初始化主题
            const saved = localStorage.getItem('theme');
            setTheme(saved === 'light' ? 'light' : 'dark');
        });
    </script>
    <script src="detail.js"></script>
    </body>

</html>
